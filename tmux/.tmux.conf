# Resize panes using Shift + Vim directional keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Navigate Panes with Vim Keys (hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes horizontally and vertically using the current path
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Optional: Also open new windows in the current path
bind c   new-window   -c "#{pane_current_path}"

# Increase the repeat time timeout to 2 seconds
set -g repeat-time 2000

# Enable Vim Keybindings in Copy Mode
set -g mode-keys vi

# Enable tmux clipboard integration
set -s set-clipboard on

# Allow applications (like NeoVim) to pass escape sequences through tmux
set -g allow-passthrough on

# Use 'v' to begin selection (like Vim visual mode)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use 'y' to copy selection to system clipboard using a helper command that works on macOS and Linux
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; else xclip -selection clipboard -in; fi"

# Drag-to-copy selection using mouse also sends it to system clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; else xclip -selection clipboard -in; fi"

# Toggle keybindings off/on for nested sessions
bind -T root F12 \
  set prefix None \; \
  set key-table off \; \
  set status-style "bg=colour235,fg=colour245" \; \
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \; \
  refresh-client -S

bind -T off F12 \
  set -u prefix \; \
  set -u key-table \; \
  set -u status-style \; \
  refresh-client -S

